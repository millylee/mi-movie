name: Tauri Build

on:
  push:
    branches: ["main"]
    tags:
      - "v*"
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Sync versions from package.json
        run: |
          node -e "const fs=require('fs');const pkg=require('./package.json');const v=pkg.version;const cargoPath='src-tauri/Cargo.toml';const confPath='src-tauri/tauri.conf.json';let cargo=fs.readFileSync(cargoPath,'utf8');cargo=cargo.replace(/version\\s*=\\s*\"[^\"]+\"/m,`version = \"${v}\"`);fs.writeFileSync(cargoPath,cargo);let conf=JSON.parse(fs.readFileSync(confPath,'utf8'));conf.version=v;fs.writeFileSync(confPath,JSON.stringify(conf,null,2)+\"\\n\");console.log('Synced version to',v);"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: "--verbose"
          tauriScript: "pnpm tauri"

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tauri-bundle-${{ matrix.os }}
          path: src-tauri/target/release/bundle/**/*
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/**/*
          generate_release_notes: true
