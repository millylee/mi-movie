name: Tauri Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Sync versions from package.json
        run: node scripts/sync-version.cjs

      - name: Generate icons from public/icon.png
        run: pnpm tauri icon public/icon.png

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: "--verbose"
          tauriScript: "pnpm tauri"

      - name: Rename Windows installer (remove -setup suffix)
        if: success() && matrix.os == 'windows-latest'
        run: |
          $file = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -Filter "*-setup.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($file) { Rename-Item $file.FullName -NewName ($file.Name -replace '-setup\.exe$','.exe') }

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: tauri-bundle-${{ matrix.os }}
          path: src-tauri/target/release/bundle/**/*

      - name: Upload to GitHub Release
        if: success() && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2.5.1
        with:
          files: |
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.AppImage
          fail_on_unmatched_files: false
          generate_release_notes: true
